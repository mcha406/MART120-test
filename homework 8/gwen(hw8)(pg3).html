        <script>
            function checkboxes()
        {
            var firstName = document.getElementById("fName").value;
            var lastName = document.getElementById("lName").value;
            var email = document.getElementById("eName").value;

            var yes = document.getElementById("yes").checked;
            var no = document.getElementById("no").checked;

            if(firstName == "")
            {
                document.getElementById("fName").style.backgroundColor ="red";
                document.getElementById("fNameMessage").innerHTML ="*Required";
                document.getElementById("fNameMessage").style.color ="red";
                hasError = true;
            }

            if(lastName == "")
            {
                document.getElementById("lName").style.backgroundColor ="red";
                document.getElementById("lNameMessage").innerHTML ="*Required";
                document.getElementById("lNameMessage").style.color ="red";
                hasError = true;
            }

            if(email =="")
            {
                document.getElementById("eName").style.backgroundColor ="red";
                document.getElementById("eNameMessage").innerHTML ="*Required";
                document.getElementById("eNameMessage").style.color ="red";
                hasError = true;
            }

            if(!yes && !no)
            {
                document.getElementById("termsMessage").innerHTML ="* Please select Yes or No";
                document.getElementById("termsMessage").style.color = "red";
                return false;
            }
    
        }
